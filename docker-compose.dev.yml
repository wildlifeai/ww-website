version: "3.9"
services:
  api:
    build:
      target: dev
    volumes:
      - ./backend/app:/app/app
    environment:
      - ALLOWED_ORIGINS=http://localhost:5173
      - LOG_LEVEL=debug

  worker:
    build:
      target: worker
    command: ["arq", "app.jobs.worker.WorkerSettings"]
    volumes:
      - ./backend/app:/app/app
    environment:
      - LOG_LEVEL=debug
