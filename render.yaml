# render.yaml — Infrastructure as Code for Render.com deployment
# https://render.com/docs/blueprint-spec

services:
  # ── FastAPI backend ────────────────────────────────────────────────
  - type: web
    name: wildlife-watcher-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    region: oregon
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          name: wildlife-watcher-redis
          type: redis
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://wildlifewatcher.ai,https://www.wildlifewatcher.ai
      - key: SENTRY_DSN
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: RATE_LIMIT_PER_MINUTE
        value: "60"
      - key: LORAWAN_WEBHOOK_SECRET
        generateValue: true
      - key: GENERAL_ORG_ID
        sync: false
    healthCheckPath: /health
    buildFilter:
      paths:
        - backend/**

  # ── ARQ worker ─────────────────────────────────────────────────────
  - type: worker
    name: wildlife-watcher-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: arq app.jobs.worker.WorkerSettings
    plan: starter
    region: oregon
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          name: wildlife-watcher-redis
          type: redis
          property: connectionString
      - key: SENTRY_DSN
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: GENERAL_ORG_ID
        sync: false
    buildFilter:
      paths:
        - backend/**

  # ── Redis ──────────────────────────────────────────────────────────
  - type: redis
    name: wildlife-watcher-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []  # Only internal access
