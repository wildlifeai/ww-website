name: Deploy Backend to Azure Container App

on:
  push:
    branches:
      - dev
      - feat/v2-migration
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (default: latest)'
        required: false
        default: 'latest'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/ww-backend:${{ github.event.inputs.tag }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/ww-backend:${{ github.sha }} \
            -f backend/Dockerfile \
            backend/

      - name: Push to Azure Container Registry
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/ww-backend:${{ github.event.inputs.tag }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/ww-backend:${{ github.sha }}

      - name: Log in to Azure CLI
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
            --name ww-backend \
            --resource-group WW-Website \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/ww-backend:${{ github.event.inputs.tag }}

      - name: Verify deployment
        run: |
          FQDN=$(az containerapp show \
            --name ww-backend \
            --resource-group WW-Website \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Waiting for container cold start..."
          sleep 30
          STATUS=$(curl -s --max-time 60 "https://${FQDN}/health" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo "unreachable")
          echo "Health check: ${STATUS}"
          if [ "$STATUS" != "ok" ]; then
            echo "::warning::Health check returned '${STATUS}' — container may still be starting up"
          fi
