name: Deploy AI Models to Supabase

on:
  push:
    branches:
      - main
    paths:
      - 'scripts/deploy_models.py'
      - 'scripts/convert_github_model.py'
      - '.github/workflows/deploy-models.yml'
  workflow_dispatch: # Allows manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-deploy.txt

      - name: Convert Person Detection Model from GitHub
        run: python scripts/convert_github_model.py

      - name: Deploy Models to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GENERAL_ORG_ID: ${{ secrets.GENERAL_ORG_ID }}
          UPLOADER_EMAIL: ${{ secrets.UPLOADER_EMAIL }}
          UPLOADER_PASSWORD: ${{ secrets.UPLOADER_PASSWORD }}
        run: python scripts/deploy_models.py
