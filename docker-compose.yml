version: "3.9"

services:
  # --- API Server ---
  api:
    build:
      context: ./backend
      target: base
    ports:
      - "8000:8000"
    environment:
      # Supabase
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      # Security
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://wildlifewatcher.ai,http://localhost:5173}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-60}
      # LoRaWAN
      - LORAWAN_WEBHOOK_SECRET=${LORAWAN_WEBHOOK_SECRET:-}
      - LORAWAN_TTN_WEBHOOK_SECRET=${LORAWAN_TTN_WEBHOOK_SECRET:-}
      - LORAWAN_CHIRPSTACK_WEBHOOK_SECRET=${LORAWAN_CHIRPSTACK_WEBHOOK_SECRET:-}
      # Azure Storage
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-}
      - AZURE_STORAGE_CONTAINER_NAME=${AZURE_STORAGE_CONTAINER_NAME:-wildlife-watcher-uploads}
      # Google Drive
      - GOOGLE_DRIVE_ENABLED=${GOOGLE_DRIVE_ENABLED:-false}
      - GOOGLE_DRIVE_FOLDER_ID=${GOOGLE_DRIVE_FOLDER_ID:-}
      - GOOGLE_SERVICE_ACCOUNT_JSON=${GOOGLE_SERVICE_ACCOUNT_JSON:-}
      - GOOGLE_DRIVE_MAX_FILE_SIZE_MB=${GOOGLE_DRIVE_MAX_FILE_SIZE_MB:-50}
      # Feature Flags
      - FF_INAT_ENABLED=${FF_INAT_ENABLED:-false}
      - FF_ML_ENABLED=${FF_ML_ENABLED:-false}
      - FF_CLUSTERING_ENABLED=${FF_CLUSTERING_ENABLED:-false}
      - FF_LORAWAN_WEBHOOKS_ENABLED=${FF_LORAWAN_WEBHOOKS_ENABLED:-true}
      - FF_PUBLIC_API_ENABLED=${FF_PUBLIC_API_ENABLED:-false}
      # General
      - GENERAL_ORG_ID=${GENERAL_ORG_ID:-b0000000-0000-0000-0000-000000000001}
      # Observability
      - SENTRY_DSN=${SENTRY_DSN:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Redis (future)
      - REDIS_URL=${REDIS_URL:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
